<!DOCTYPE html>
<html>
<head>
<meta
charset="utf-8">
<meta
name="viewport"
content="width=
device-width">
<title>H</title>
<style>
body{
  background:#222;
  color:#fff;
  font-family:
    sans-serif;
  padding:5px;
  text-align:
    center;
}
.grid{
  display:grid;
  grid-template-
    columns:
    repeat(5,45px);
  gap:5px;
  justify-content:
    center;
  margin:10px 0;
}
.cell{
  width:45px;
  height:45px;
  background:#333;
  font-size:24px;
  line-height:
    45px;
  border-radius:
    4px;
  border:1px 
    solid #555;
}
#timer{
  color:#ff4081;
  font-weight:
    bold;
}
</style>
</head>
<body>
<h2 style="
font-size:15px;
margin:5px;">
🌳 ステルスかくれんぼ
</h2>
<div id="status">
👉 隠れたい草むら(🌳)を
タッチして選んでね！
</div>
<div id="timer">
準備中...
</div>

<!-- 5x5マス画面 -->
<div class="grid"
id="board"></div>

<div id="log"
style="font-size:
11px;color:#aaa;">
</div>

<script>
const boardEl=
document
.getElementById(
'board');
const timerEl=
document
.getElementById(
'timer');
const statusEl=
document
.getElementById(
'status');
const logEl=
document
.getElementById(
'log');

// 0:空地, 1:草むら
const MAP=[,
 ,
 ,
 ,
  [1,0,1,0,1]
];

// ゲーム状態
// 0:隠れ先選び, 1:本番
let mode=0; 
let time=180;

// あなたの位置
let p={x:-1,y:-1};

// 👹 鬼ボット（最初は中央待機）
let b1={
  name:"勘が鋭い鬼AA",
  x:2,y:2,
  isSmart:1
};
let b2={
  name:"鈍感な鬼BB",
  x:2,y:2,
  isSmart:0
};

// マップ描画
function draw(){
  let html="";
  for(
    let y=0;
    y<5;
    y++
  ){
    for(
      let x=0;
      x<5;
      x++
    ){
      let char=
        MAP[y][x]==1?
        "🌳":"⬜";
      
      // あなたがいる
      if(
        p.x==x&&
        p.y==y
      ){
        char="👨";
      }
      
      // 鬼たちがいる(本番のみ表示)
      if(mode==1){
        if(
          b1.x==x&&
          b1.y==y
        )char="👹";
        if(
          b2.x==x&&
          b2.y==y
        )char="💀";
      }
      
      // タッチイベント付きのマス
      html+=`
        <div class="cell"
        onclick="clickCell(
        ${x},${y})">
        ${char}
        </div>
      `;
    }
  }
  boardEl.innerHTML=html;
}

// 🌳 マスがタッチされた時
function clickCell(x,y){
  // 隠れる場所選び中、かつ草むらなら
  if(
    mode==0&&
    MAP[y][x]==1
  ){
    p.x=x;
    p.y=y;
    // 本番フェーズへ移行
    mode=1;
    statusEl.innerHTML=
    "👹 鬼が探し始めました！<br>"+
    "見つからないで…！";
    startTimer();
  }
}

// 🧠 鬼のリアルタイム移動AI
function moveOni(b){
  if(b.isSmart){
    // 鋭い鬼：あなたの隠れ家へ
    // 最短ルートで一直線に進む
    if(b.x<p.x)b.x++;
    else if(b.x>p.x)b.x--;
    else if(b.y<p.y)b.y++;
    else if(b.y>p.y)b.y--;
  }else{
    // 鈍感な鬼：ランダムに
    // 草むらを調査する
    let r=Math.random();
    if(r<0.25)b.x++;
    if(r>=0.25&&r<0.5)b.x--;
    if(r>=0.5&&r<0.75)b.y++;
    if(r>=0.75)b.y--;
  }
  
  // 外に出さない
  if(b.x<0)b.x=0;
  if(b.x>4)b.x=4;
  if(b.y<0)b.y=0;
  if(b.y>4)b.y=4;
}

// ⏱️ タイマー＆ゲーム同期
function startTimer(){
  const interval=
  setInterval(()=>{
    if(time>0&&mode==1){
      time--;
      let m=
        Math.floor(
        time/60);
      let s=time%60;
      timerEl.innerText=
      `残り: ${m}分` +
      `${s<10?"0":""}${s}秒`;
      
      // 鬼たちが1マス動く
      moveOni(b1);
      moveOni(b2);
      
      // 捕獲判定
      if(
        (b1.x==p.x&&b1.y==p.y)||
        (b2.x==p.x&&b2.y==p.y)
      ){
        mode=2; // 終了
        clearInterval(
          interval);
        statusEl.innerHTML=
        "💀 見つかった！！<br>"+
        "ゲームオーバー";
      }
      
      draw();
    }else if(time==0){
      clearInterval(
        interval);
      statusEl.innerHTML=
      "🎉 3分間逃げ切った！<br>"+
      "あなたの勝ち！";
    }
  },1000);
}

// 初期起動
draw();
</script>
</body>
</html>
