<!DOCTYPE html>
<html>
<head>
<meta
charset="utf-8">
<meta
name="viewport"
content="width=
device-width">
<title>A</title>
<style>
body{
  background:#222;
  color:#fff;
  margin:0;
  padding:5px;
}
#win{
  width:100%;
  height:200px;
  overflow:hidden;
  position:
    relative;
  background:#333;
}
#stg{
  position:
    absolute;
  width:3000px;
  height:200px;
}
.pl{
  position:
    absolute;
  width:30px;
  height:30px;
  font-size:20px;
}
.tg{
  position:
    absolute;
  top:-12px;
  font-size:8px;
}
.bb{
  position:
    absolute;
  top:-25px;
  background:#fff;
  color:#000;
  font-size:8px;
  display:none;
}
.fl{
  position:
    absolute;
  bottom:0;
  width:3000px;
  height:20px;
  background:green;
}
.tr{
  position:
    absolute;
  bottom:20px;
}
.gl{
  position:
    absolute;
  bottom:20px;
  left:2800px;
}
.btn{
  font-size:10px;
  margin:2px;
}
</style>
</head>
<body>
<div id="info"></div>
<div id="win">
<div id="stg">
<div class="fl"></div>
<div class="tr"
style="left:600px;">
🔺</div>
<div class="tr"
style="left:1200px;">
🔺</div>
<div class="goal">🎁</div>
<div id="p1"
class="pl">👨
<div class="tg">U</div>
<div id="pB"
class="bb"></div>
</div>
<div id="bBox"></div>
</div>
</div>
<div>
<button class="btn"
onclick="t('hi')">
hi</button>
<button class="btn"
onclick="t('gg')">
gg</button>
<button class="btn"
onclick="t('out')"
style="color:red;">
out</button>
</div>
<script>
const stg=
document
.getElementById(
'stg');
const p1=
document
.getElementById(
'p1');
const pB=
document
.getElementById(
'pB');
const bBox=
document
.getElementById(
'bBox');
const info=
document
.getElementById(
'info');
let p={
  x:100,y:150,
  vx:0,vy:0,
  j:0
};
const n=[
  "AA","BB",
  "CC","DD"
];
const bL=[
  {p:0,s:5},
  {p:1,s:3},
  {p:2,s:7}
];
const total=
Math.floor(
Math.random()*3
)+2;
info.innerText=
total+"人マッチ";
let bots=[];
for(
  let i=0;
  i<total-1;
  i++
){
  let b=bL[
    Math.floor(
    Math.random()*
    bL.length)
  ];
  if(
    Math.random()
    <0.1
  ){
    b={p:3,s:15};
  }
  let div=
    document
    .createElement(
    'div');
  div.className='pl';
  div.innerText=
    b.p==3?
    "👑":"🤖";
  let tg=
    document
    .createElement(
    'div');
  tg.className='tg';
  tg.innerText=
    b.p==3?
    "CH":n[i%4];
  div.appendChild(tg);
  let bb=
    document
    .createElement(
    'div');
  bb.className='bb';
  div.appendChild(bb);
  bBox.appendChild(
    div);
  bots.push({
    x:80+i*30,
    y:150,vy:0,
    j:0,p:b.p,
    s:b.s,el:div,
    bb:bb,out:0
  });
}
function t(txt){
  sB(pB,txt);
  bots.forEach(b=>{
    if(b.out)return;
    setTimeout(()=>{
      let r="...";
      if(txt=='hi')
        r="hi!";
      if(txt=='gg')
        r="ty!";
      if(txt=='out')
        r="bye";
      sB(b.bb,r);
      if(txt=='out'){
        b.out=1;
        b.el.style
        .opacity="0";
      }
    },500);
  });
}
function sB(el,txt){
  el.innerText=txt;
  el.style.display=
    'block';
  setTimeout(()=>{
    el.style.display=
      'none';
  },1500);
}
window
.addEventListener(
'keydown',e=>{
  if(e.key==
    'ArrowRight')
    p.vx=6;
  if(e.key==
    'ArrowLeft')
    p.vx=-6;
  if(e.key==
    'ArrowUp'&&
    !p.j){
    p.vy=-12;
    p.j=1;
  }
});
window
.addEventListener(
'keyup',e=>{
  p.vx=0;
});
function loop(){
  p.x+=p.vx;
  p.vy+=0.8;
  p.y+=p.vy;
  if(p.y>=150){
    p.y=150;
    p.vy=0;
    p.j=0;
  }
  p1.style.left=
    p.x+'px';
  p1.style.top=
    p.y+'px';
  bots.forEach(b=>{
    if(b.out)return;
    if(b.p==3){
      b.x+=b.s;
      b.y=50;
    }else{
      b.vy+=0.8;
      b.y+=b.vy;
      if(b.y>=150){
        b.y=150;
        b.vy=0;
        b.j=0;
      }
      b.x+=b.s;
      if(
        b.x>550&&
        b.x<580&&
        !b.j
      ){
        b.vy=-12;
        b.j=1;
      }
    }
    b.el.style.left=
      b.x+'px';
    b.el.style.top=
      b.y+'px';
  });
  let c=p.x-100;
  if(c<0)c=0;
  stg.style.left=
    -c+'px';
  requestAnimationFrame(
    loop
  );
}
loop();
</script>
</body>
</html>
