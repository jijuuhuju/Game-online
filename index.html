<!DOCTYPE html>
<html>
<head>
<meta
charset="utf-8">
<meta
name="viewport"
content="width=
device-width">
<title>H</title>
<style>
body{
  background:#222;
  color:#fff;
  font-family:
    sans-serif;
  padding:5px;
  text-align:
    center;
}
.grid{
  display:grid;
  grid-template-
    columns:
    repeat(5,45px);
  gap:5px;
  justify-content:
    center;
  margin:10px 0;
}
.cell{
  width:45px;
  height:45px;
  background:#333;
  font-size:24px;
  line-height:
    45px;
  border-radius:
    4px;
  border:1px 
    solid #555;
}
</style>
</head>
<body>
<h2 style="
font-size:15px;
margin:5px;">
🌳 ステルスかくれんぼ
</h2>
<div id="status">
👉 隠れたい草むら(🌳)を
タッチして選んでね！
</div>
<div id="timer">
</div>

<div class="grid"
id="board"></div>

<script>
const boardEl=
document
.getElementById(
'board');
const timerEl=
document
.getElementById(
'timer');
const statusEl=
document
.getElementById(
'status');

// 🛠️ 絶対に消えない文字列方式に変更！
// 1が草むら、0が空き地です
const MAP_STR = 
  "10101" +
  "11111" +
  "00000" +
  "11111" +
  "10101";

let mode=0; 
let time=180;
let p={x:-1,y:-1};

let b1={
  name:"鬼AA",
  x:2,y:2,
  isSmart:1
};
let b2={
  name:"鬼BB",
  x:2,y:2,
  isSmart:0
};

function draw(){
  let html="";
  for(
    let y=0;
    y<5;
    y++
  ){
    for(
      let x=0;
      x<5;
      x++
    ){
      // 文字列からデータを取り出す
      let idx = y * 5 + x;
      let tile = 
        MAP_STR.charAt(idx);
      let char=
        tile=="1"?
        "🌳":"⬜";
      
      if(
        p.x==x&&
        p.y==y
      ){
        char="👨";
      }
      
      if(mode==1){
        if(
          b1.x==x&&
          b1.y==y
        )char="👹";
        if(
          b2.x==x&&
          b2.y==y
        )char="💀";
      }
      
      html+=`
        <div class="cell"
        onclick="clickCell(
        ${x},${y})">
        ${char}
        </div>
      `;
    }
  }
  boardEl.innerHTML=html;
}

function clickCell(x,y){
  let idx = y * 5 + x;
  let tile = 
    MAP_STR.charAt(idx);
    
  if(
    mode==0&&
    tile=="1"
  ){
    p.x=x;
    p.y=y;
    mode=1;
    statusEl.innerHTML=
    "👹 鬼が探し始めました！<br>"+
    "見つからないで…！";
    startTimer();
  }
}

function moveOni(b){
  if(b.isSmart){
    if(b.x<p.x)b.x++;
    else if(b.x>p.x)b.x--;
    else if(b.y<p.y)b.y++;
    else if(b.y>p.y)b.y--;
  }else{
    let r=Math.random();
    if(r<0.25)b.x++;
    if(r>=0.25&&r<0.5)b.x--;
    if(r>=0.5&&r<0.75)b.y++;
    if(r>=0.75)b.y--;
  }
  
  if(b.x<0)b.x=0;
  if(b.x>4)b.x=4;
  if(b.y<0)b.y=0;
  if(b.y>4)b.y=4;
}

function startTimer(){
  const interval=
  setInterval(()=>{
    if(time>0&&mode==1){
      time--;
      let m=
        Math.floor(
        time/60);
      let s=time%60;
      timerEl.innerText=
      `残り: ${m}分` +
      `${s<10?"0":""}${s}秒`;
      
      moveOni(b1);
      moveOni(b2);
      
      if(
        (b1.x==p.x&&b1.y==p.y)||
        (b2.x==p.x&&b2.y==p.y)
      ){
        mode=2;
        clearInterval(
          interval);
        statusEl.innerHTML=
        "💀 見つかった！！<br>"+
        "ゲームオーバー";
      }
      
      draw();
    }else if(time==0){
      clearInterval(
        interval);
      statusEl.innerHTML=
      "🎉 3分間逃げ切った！<br>"+
      "あなたの勝ち！";
    }
  },1000);
}

draw();
</script>
</body>
</html>
