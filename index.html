<!DOCTYPE html>
<html>
<head>
<meta
charset="utf-8">
<meta
name="viewport"
content="width=
device-width,
initial-scale=1.0">
<title>H</title>
<style>
body{
  background:#1e1e24;
  color:#fff;
  font-family:
    sans-serif;
  padding:10px;
  text-align:
    center;
}
h2{
  font-size:18px;
  margin:5px;
  color:#ff7043;
  text-shadow:
    0 2px 4px 
    rgba(0,0,0,0.5);
}
#status{
  font-size:13px;
  color:#b0bec5;
  margin:10px;
  min-height:36px;
}
#timer{
  color:#ff4081;
  font-weight:bold;
  font-size:16px;
  letter-spacing:1px;
}
.grid{
  display:grid;
  grid-template-columns:
    repeat(5,50px);
  gap:6px;
  justify-content:
    center;
  margin:15px auto;
  position:relative;
  width:274px;
}
.cell{
  width:50px;
  height:50px;
  background:#263238;
  border-radius:8px;
  border:2px solid #37474f;
  box-shadow:
    inset 0 2px 4px
    rgba(0,0,0,0.3);
  cursor:pointer;
  position:relative;
}
/* 🛠️ はみ出さないよう
幅を50pxに修正しました */
.char-layer{
  position:absolute;
  width:50px;
  height:40px;
  pointer-events:none;
  font-size:28px;
  line-height:40px;
  transition:
    left 0.4s ease,
    top 0.4s ease;
  z-index:100;
}
.btn{
  background:#0288d1;
  color:#fff;
  border:none;
  padding:8px 14px;
  font-size:12px;
  border-radius:20px;
  font-weight:bold;
  box-shadow:0 3px 0 #01579b;
  cursor:pointer;
  margin:2px;
}
.btn:active{
  transform:translateY(3px);
  box-shadow:none;
}
.act{
  background:#e65100;
  box-shadow:0 3px 0 #b71c1c;
}
</style>
</head>
<body>
<h2>👹 ステルスかくれんぼ 👹</h2>
<div id="modeSelect" style="margin:5px;">
<!-- 🛠️ 確率をボタン文字に反映 -->
<button id="m1" class="btn act" onclick="setM(0.2,'m1')">🌱 イージー(20%)</button>
<button id="m2" class="btn" onclick="setM(0.45,'m2')">⚖️ ノーマル(45%)</button>
<button id="m3" class="btn" onclick="setM(0.85,'m3')">🔥 ハード(85%)</button>
</div>

<div id="timer">待機中</div>
<div id="status">
👉 隠れたいたい草むら(🌳)を<br>
タップして選んでね！
</div>

<div style="
position:relative;
display:inline-block;">
<div class="grid" id="board"></div>
<div id="p1" class="char-layer"></div>
<div id="b1" class="char-layer"></div>
</div>

<br>
<div id="ctrl" style="
display:none; margin:10px;">
<button class="btn" style="background:#558b2f; box-shadow:0 3px 0 #33691e;"
onclick="location.reload()">
🔄 もう一回遊ぶ
</button>
</div>

<script>
const boardEl=document.getElementById('board');
const timerEl=document.getElementById('timer');
const statusEl=document.getElementById('status');
const ctrlEl=document.getElementById('ctrl');
const modeSelEl=document.getElementById('modeSelect');

const pEl=document.getElementById('p1');
const b1El=document.getElementById('b1');

const MAP_STR = 
  "10101" +
  "11111" +
  "00000" +
  "11111" +
  "10101";

let mode=0; 
let time=180;
let p={x:-1,y:-1};

let isSlow = false; 
// 🛠️ 初期確率をイージー(0.2)に変更
let aiRate = 0.2; 

let b1={name:"鬼AA",x:2,y:2,emoji:"👹",el:b1El};

function setM(rate, btnId){
  if(mode !== 0) return; 
  aiRate = rate;
  document.getElementById('m1').classList.remove('act');
  document.getElementById('m2').classList.remove('act');
  document.getElementById('m3').classList.remove('act');
  document.getElementById(btnId).classList.add('act');
}

function ani(charObj, x, y, emoji){
  if(x < 0 || y < 0){
    charObj.el.style.display = "none";
    return;
  }
  charObj.el.style.display = "block";
  charObj.el.innerText = emoji;
  // 🛠️ ぴったり重なるよう計算を調節
  charObj.el.style.left = (x * 56) + "px";
  charObj.el.style.top = (y * 56) + "px";
}

function drawGrid(){
  let html="";
  for(let y=0; y<5; y++){
    for(let x=0; x<5; x++){
      let idx = y * 5 + x;
      let tile = MAP_STR.charAt(idx);
      let char= tile=="1"?"🌳":"⬜";
      
      html+=`
        <div class="cell"
        onclick="clickCell(${x},${y})">
        ${char}
        </div>
      `;
    }
  }
  boardEl.innerHTML=html;
}

function clickCell(x,y){
  let idx = y * 5 + x;
  let tile = MAP_STR.charAt(idx);
    
  if(mode==0 && tile=="1"){
    p.x=x; p.y=y;
    mode=1;
    modeSelEl.style.display = "none";
    statusEl.innerHTML=
    "👹 鬼が探し始めました！<br>草むら（🌳）に入ると鬼の動きが遅くなります！";
    
    ani({el:pEl}, p.x, p.y, "👨");
    ani(b1, b1.x, b1.y, b1.emoji);
    
    moveOni(b1);
    ani(b1, b1.x, b1.y, b1.emoji);
    
    startTimer();
  }
}

function moveOni(b){
  let idx = b.y * 5 + b.x;
  let tile = MAP_STR.charAt(idx);
  if(tile == "1" && !isSlow){
    isSlow = true; 
    return;
  }
  isSlow = false; 

  let rand = Math.random();
  
  if(rand < aiRate){
    if(b.x < p.x) b.x++;
    else if(b.x > p.x) b.x--;
    else if(b.y < p.y) b.y++;
    else if(b.y > p.y) b.y++;
  } else {
    let r = Math.random();
    if(r<0.25)b.x++; else if(r<0.5)b.x--; else if(r<0.75)b.y++; else b.y--;
  }
  
  if(b.x<0)b.x=0; if(b.x>4)b.x=4; if(b.y<0)b.y=0; if(b.y>4)b.y=4;
}

function startTimer(){
  const interval=
  setInterval(()=>{
    if(time>0 && mode==1){
      time--;
      let m= Math.floor(time/60);
      let s=time%60;
      timerEl.innerText= `⏱️ 残り: ${m}分${s<10?"0":""}${s}秒`;
      
      moveOni(b1);
      ani(b1, b1.x, b1.y, b1.emoji);
      
      if(b1.x==p.x&&b1.y==p.y){
        mode=2;
        clearInterval(interval);
        statusEl.innerHTML= "💀 <b>見つかってしまった！</b><br>ゲームオーバー";
        ctrlEl.style.display = "block";
      }
    }else if(time==0){
      clearInterval(interval);
      statusEl.innerHTML= "🎉 <b>3分間逃げ切った！</b><br>あなたの勝ち！";
      ctrlEl.style.display = "block";
    }
  },1000);
}

ani({el:pEl}, -1, -1, "");
ani(b1, -1, -1, "");
drawGrid();
</script>
</body>
</html>
