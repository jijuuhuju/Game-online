<!DOCTYPE html>
<html>
<head>
<meta
charset="utf-8">
<meta
name="viewport"
content="width=
device-width">
<title>C</title>
<style>
body{
  background:#222;
  color:#fff;
  font-family:
    sans-serif;
  padding:5px;
}
.lane{
  background:#333;
  margin:15px 0;
  padding:5px;
  position:
    relative;
  height:35px;
  border-bottom:
    1px dashed #666;
}
.car{
  position:
    absolute;
  font-size:22px;
  left:0;
}
.nm{
  font-size:9px;
  position:
    absolute;
  top:-3px;
  color:#aaa;
}
.go{
  font-size:20px;
  padding:10px;
  width:90%;
  max-width:300px;
  background:#e65100;
  color:#fff;
  border:none;
  border-radius:5px;
}
</style>
</head>
<body>
<h2 style="
font-size:16px;">
🏎️ オンラインカートレース
</h2>
<div id="info"></div>
<div id="track"></div>
<br>
<div>
<button class="go"
onclick="go()">
🏎️ アクセル連打！
</button>
</div>

<script>
const track=
document
.getElementById(
'track');
const info=
document
.getElementById(
'info');

// あなたの進んだ距離(px)
let myX = 0;

const names=[
  "tarou","ken",
  "same","Gamer"
];

const total=
Math.floor(
Math.random()*3
)+2;

info.innerText=
total+"人マッチング完了";

let bots=[];

// ライバルの生成
for(
  let i=0;
  i<total-1;
  i++
){
  let isC=
    Math.random()
    <0.1;
  
  bots.push({
    name:isC?
    "👑チーター":names[i],
    x:0,
    isC:isC,
    // ボットごとの移動速度
    spd:2+Math.random()*3
  });
}

// 画面を書き換える関数
function draw(){
  // ゴール幅(240px)を100%とした割合
  let myM=
    Math.floor(
    (myX/240)*100);
  if(myM>100)myM=100;

  let html=`
    <div class="lane">
    <div class="nm">あなた</div>
    <div class="car"
    style="left:${myX}px;">
    🏎️ [${myM}m]</div>
    </div>
  `;
  
  bots.forEach(b=>{
    let bM=
      Math.floor(
      (b.x/240)*100);
    if(bM>100)bM=100;
    
    html+=`
      <div class="lane">
      <div class="nm">
      ${b.name}</div>
      <div class="car"
      style="left:${b.x}px;">
      ${b.isC?"🛸":"🚗"} 
      [${bM}m]</div>
      </div>
    `;
  });
  
  track.innerHTML=html;
}

// アクセルボタンを押した時
function go(){
  if(myX<240){
    myX += 15; // 15マス進む
  }
  draw();
}

// 🔄 リアルタイムレースループ
function loop(){
  bots.forEach(b=>{
    if(b.x<240){
      if(b.isC){
        b.x+=8; // チーターはワープ
      }else{
        b.x+=b.spd; // 通常走行
      }
    }
  });
  
  draw();
  
  // ゴール判定
  let over=0;
  if(myX>=240)over=1;
  bots.forEach(b=>{
    if(b.x>=240)over=1;
  });

  // レース継続ならループ
  if(!over){
    requestAnimationFrame(
      loop
    );
  }else{
    info.innerText=
      "🏁 レース終了！";
  }
}

// スタート
draw();
loop();
</script>
</body>
</html>
